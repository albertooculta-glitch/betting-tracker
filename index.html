<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Betting Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a; --text: #f0f0f0; --muted: #666; --accent: #c8f135; --green: #4ade80; --red: #f87171; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
  .header { padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; color: var(--accent); font-family: 'DM Mono', monospace; }
  .bank-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; cursor: pointer; }
  .bank-pill span { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .bank-edit-wrap { display: none; align-items: center; gap: 6px; }
  .bank-edit-wrap input { background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 10px; font-size: 14px; color: var(--text); width: 100px; font-family: 'DM Mono', monospace; }
  .bank-edit-wrap button { padding: 8px 12px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; }
  .btn-ok { background: var(--accent); color: #000; font-weight: 600; }
  .btn-cancel { background: var(--surface2); color: var(--muted); }
  .tabs { display: flex; margin: 16px 16px 0; background: var(--surface); border-radius: 12px; padding: 4px; gap: 4px; }
  .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; border-radius: 9px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .tab-btn.active { background: var(--surface2); color: var(--text); }
  .tab-content { display: none; padding: 12px 16px 100px; }
  .tab-content.active { display: block; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .form-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; }
  .field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-appearance: none; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stake-display { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .stake-equals { font-size: 12px; color: var(--muted); }
  .stake-amount { font-size: 18px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
  .btn-add { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; font-size: 15px; font-weight: 600; color: #000; cursor: pointer; margin-top: 4px; font-family: 'DM Sans', sans-serif; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .pick-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .pick-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .pick-name { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; padding-right: 8px; }
  .pick-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-pending { background: var(--surface2); color: var(--muted); }
  .badge-win { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge-loss { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-void { background: var(--surface2); color: var(--muted); }
  .pick-meta { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .pick-meta-item { font-size: 12px; color: var(--muted); }
  .pick-meta-item span { color: var(--text); font-weight: 500; }
  .pick-pnl { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }
  .pick-actions { display: flex; gap: 8px; }
  .result-btn { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .result-btn.win { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--green); }
  .result-btn.loss { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--red); }
  .result-btn.void { background: var(--surface2); color: var(--muted); }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 3rem 0; }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .metric-lbl { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .metric-val { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .tip-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 14px; padding: 16px; font-size: 14px; color: var(--muted); line-height: 1.6; }
  .tip-card strong { color: var(--text); display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="header">
  <h1>BETTING TRACKER</h1>
  <div class="bank-pill" id="bank-pill" onclick="toggleBankEdit()">
    <span id="bank-label">100.00€</span>
    <span style="font-size:10px;color:#666;">✎</span>
  </div>
  <div class="bank-edit-wrap" id="bank-edit-wrap">
    <input type="number" id="bank-manual" step="0.01" min="0" />
    <button class="btn-ok" onclick="applyBank()">OK</button>
    <button class="btn-cancel" onclick="cancelBankEdit()">✕</button>
  </div>
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('registro',event)">Registro</button>
  <button class="tab-btn" onclick="showTab('stats',event)">Estadísticas</button>
</div>
<div id="tab-registro" class="tab-content active">
  <div class="form-card">
    <p class="form-title">Nueva apuesta</p>
    <div class="field"><label>PICK</label><input type="text" id="inp-pick" placeholder="Ej: Braga vs Freiburg" autocomplete="off" /></div>
    <div class="field"><label>MERCADO</label><input type="text" id="inp-mercado" placeholder="Ej: Under 2.5" autocomplete="off" /></div>
    <div class="grid2">
      <div class="field"><label>CUOTA</label><input type="number" id="inp-cuota" placeholder="1.75" step="0.01" min="1" inputmode="decimal" /></div>
      <div class="field"><label>STAKE %</label><input type="number" id="inp-stake-pct" placeholder="3" min="0.5" max="10" step="0.5" inputmode="decimal" oninput="calcStake()" /></div>
    </div>
    <div class="stake-display">
      <span class="stake-equals">stake =</span>
      <span class="stake-amount" id="stake-euros">0.00€</span>
    </div>
    <button class="btn-add" onclick="addBet()">Añadir apuesta</button>
  </div>
  <p class="section-title">Historial</p>
  <div id="bets-rows"><p class="empty">sin apuestas todavía</p></div>
</div>
<div id="tab-stats" class="tab-content">
  <div class="metrics-grid">
    <div class="metric-card"><p class="metric-lbl">BANKROLL</p><p class="metric-val" id="stat-bank">100€</p></div>
    <div class="metric-card"><p class="metric-lbl">APUESTAS</p><p class="metric-val" id="stat-total">0</p></div>
    <div class="metric-card"><p class="metric-lbl">ACIERTOS</p><p class="metric-val" id="stat-wins">0%</p></div>
    <div class="metric-card"><p class="metric-lbl">P&L</p><p class="metric-val" id="stat-pnl">0€</p></div>
  </div>
  <div class="chart-wrap"><div style="position:relative;height:180px;"><canvas id="bankChart">Sin datos.</canvas></div></div>
  <div class="tip-card" id="recomendacion"><strong>Recomendación</strong>Registra al menos 5 apuestas para recibir feedback real.</div>
</div>
<script>
let bank = parseFloat(localStorage.getItem('bt_bank') || '100');
let bets = JSON.parse(localStorage.getItem('bt_bets') || '[]');
let chart = null;
function save() { localStorage.setItem('bt_bank', bank.toFixed(2)); localStorage.setItem('bt_bets', JSON.stringify(bets)); }
function updateBankDisplays() { document.getElementById('bank-label').textContent = bank.toFixed(2) + '€'; calcStake(); }
function toggleBankEdit() { document.getElementById('bank-manual').value = bank.toFixed(2); document.getElementById('bank-edit-wrap').style.display = 'flex'; document.getElementById('bank-pill').style.display = 'none'; document.getElementById('bank-manual').focus(); }
function applyBank() { const val = parseFloat(document.getElementById('bank-manual').value); if (!isNaN(val) && val >= 0) { bank = parseFloat(val.toFixed(2)); updateBankDisplays(); updateStats(); save(); } cancelBankEdit(); }
function cancelBankEdit() { document.getElementById('bank-edit-wrap').style.display = 'none'; document.getElementById('bank-pill').style.display = 'flex'; }
function calcStake() { const pct = parseFloat(document.getElementById('inp-stake-pct').value) || 0; document.getElementById('stake-euros').textContent = (bank * pct / 100).toFixed(2) + '€'; }
function addBet() { const pick = document.getElementById('inp-pick').value.trim(); const mercado = document.getElementById('inp-mercado').value.trim(); const cuota = parseFloat(document.getElementById('inp-cuota').value); const pct = parseFloat(document.getElementById('inp-stake-pct').value); if (!pick || !mercado || !cuota || !pct) { alert('Rellena todos los campos'); return; } const stakeEur = parseFloat((bank * pct / 100).toFixed(2)); bets.push({ pick, mercado, cuota, pct, stakeEur, resultado: 'pendiente', pnl: 0 }); document.getElementById('inp-pick').value = ''; document.getElementById('inp-mercado').value = ''; document.getElementById('inp-cuota').value = ''; document.getElementById('inp-stake-pct').value = ''; document.getElementById('stake-euros').textContent = '0.00€'; save(); renderBets(); updateStats(); }
function setResult(i, res) { const b = bets[i]; if (b.resultado !== 'pendiente') bank = parseFloat((bank - b.pnl).toFixed(2)); if (res === 'win') { b.pnl = parseFloat((b.stakeEur * (b.cuota - 1)).toFixed(2)); b.resultado = 'win'; } else if (res === 'loss') { b.pnl = -b.stakeEur; b.resultado = 'loss'; } else { b.pnl = 0; b.resultado = 'void'; } bank = parseFloat((bank + b.pnl).toFixed(2)); save(); updateBankDisplays(); renderBets(); updateStats(); }
function renderBets() { const container = document.getElementById('bets-rows'); if (!bets.length) { container.innerHTML = '<p class="empty">sin apuestas todavía</p>'; return; } container.innerHTML = [...bets].reverse().map((b, ri) => { const i = bets.length - 1 - ri; const badgeClass = b.resultado === 'win' ? 'badge-win' : b.resultado === 'loss' ? 'badge-loss' : b.resultado === 'void' ? 'badge-void' : 'badge-pending'; const badgeText = b.resultado === 'win' ? 'ganada' : b.resultado === 'loss' ? 'perdida' : b.resultado === 'void' ? 'void' : 'pendiente'; const pnlClass = b.pnl > 0 ? 'pnl-pos' : b.pnl < 0 ? 'pnl-neg' : ''; const pnlStr = b.pnl >= 0 ? '+' + b.pnl.toFixed(2) + '€' : b.pnl.toFixed(2) + '€'; const actions = b.resultado === 'pendiente' ? `<div class="pick-actions"><button class="result-btn win" onclick="setResult(${i},'win')">Ganada ✓</button><button class="result-btn loss" onclick="setResult(${i},'loss')">Perdida ✗</button><button class="result-btn void" onclick="setResult(${i},'void')">Void</button></div>` : `<div class="pick-pnl ${pnlClass}">${pnlStr}</div>`; return `<div class="pick-card"><div class="pick-top"><div class="pick-name">${b.pick}</div><span class="pick-badge ${badgeClass}">${badgeText}</span></div><div class="pick-meta"><div class="pick-meta-item">Mercado <span>${b.mercado}</span></div><div class="pick-meta-item">Cuota <span>${b.cuota.toFixed(2)}</span></div><div class="pick-meta-item">Stake <span>${b.stakeEur.toFixed(2)}€</span></div></div>${actions}</div>`; }).join(''); }
function updateStats() { const settled = bets.filter(b => b.resultado !== 'pendiente'); const wins = settled.filter(b => b.resultado === 'win').length; const pnl = settled.reduce((a, b) => a + b.pnl, 0); const pct = settled.length > 0 ? Math.round(wins / settled.length * 100) : 0; document.getElementById('stat-bank').textContent = bank.toFixed(0) + '€'; document.getElementById('stat-total').textContent = bets.length; document.getElementById('stat-wins').textContent = pct + '%'; const pnlEl = document.getElementById('stat-pnl'); pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(0) + '€'; pnlEl.className = 'metric-val ' + (pnl > 0 ? 'pnl-pos' : pnl < 0 ? 'pnl-neg' : ''); updateRecomendacion(settled, pnl); }
function updateRecomendacion(settled, pnl) { const box = document.getElementById('recomendacion'); let msg = ''; if (settled.length < 5) { msg = 'Registra al menos 5 apuestas resueltas para recibir feedback real.'; } else { const totalStaked = settled.reduce((a, b) => a + b.stakeEur, 0); const roi = totalStaked > 0 ? (pnl / totalStaked * 100) : 0; const streak = calcStreak(); if (streak >= 2) msg += `⚠️ Llevas ${streak} pérdidas seguidas — no apostar hoy. `; if (roi > 5) msg += `ROI ${roi.toFixed(1)}% — buen ritmo. `; else if (roi < -10) msg += `ROI ${roi.toFixed(1)}% — revisa si hay edge real. `; else msg += `ROI ${roi.toFixed(1)}% — sigue acumulando picks de calidad. `; } box.innerHTML = `<strong>Recomendación</strong>${msg}`; }
function calcStreak() { const settled = bets.filter(b => b.resultado === 'loss' || b.resultado === 'win'); let s = 0; for (let i = settled.length - 1; i >= 0; i--) { if (settled[i].resultado === 'loss') s++; else break; } return s; }
function showTab(t, e) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); if (e && e.target) e.target.classList.add('active'); if (t === 'stats') renderChart(); }
function renderChart() { const settled = bets.filter(b => b.resultado !== 'pendiente'); const labels = ['', ...settled.map((_, i) => '#' + (i + 1))]; let running = 100; const data = [100, ...settled.map(b => { running = parseFloat((running + b.pnl).toFixed(2)); return running; })]; const ctx = document.getElementById('bankChart').getContext('2d'); if (chart) chart.destroy(); const color = running >= 100 ? '#c8f135' : '#f87171'; chart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ data, borderColor: color, backgroundColor: color + '15', borderWidth: 2, pointRadius: 3, fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1c1c1c' } }, y: { ticks: { color: '#555', font: { size: 10 }, callback: v => v + '€' }, grid: { color: '#1c1c1c' } } } } }); }
updateBankDisplays(); renderBets(); updateStats();
</script>
</body>
</html>
